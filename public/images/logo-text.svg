<svg width="100" height="32" viewBox="0 0 100 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef7f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6d3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="100" height="32" rx="6" fill="url(#textGradient)" stroke="#2c3e50" stroke-width="0.5"/>
  
  <!-- ProDX Text -->
  <text x="50" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">ProDX</text>
  
  <!-- ERP System Text -->
  <text x="50" y="28" font-family="Arial, sans-serif" font-size="6" fill="#6c757d" text-anchor="middle">ERP System</text>
</svg>
